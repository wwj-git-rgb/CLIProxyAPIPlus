# CLIProxyAPIPlus Workflow Code Change With Corresponding Test Update

## Action

Follow the code-change-with-corresponding-test-update workflow:
1. Modify or add logic in a Go source file (e.g., .go)
2. Update or add a corresponding test file (e.g., _test.go) in the same or related directory
3. Commit both files together

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: internal/registry/model_definitions_test.go, sdk/cliproxy/auth/request_auth_prepare_test.go, internal/translator/codex/claude/codex_claude_request.go


# CLIProxyAPIPlus Workflow Feature Or Bugfix Implementation With Unit Tests

## Action

Follow the feature-or-bugfix-implementation-with-unit-tests workflow:
1. Modify or add Go implementation file (e.g., executor, conductor, response handler).
2. Create or update the corresponding _test.go file with unit tests covering the new or changed logic.
3. Commit both the implementation and test file together.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~4x per month
- Files: sdk/cliproxy/auth/conductor.go, sdk/cliproxy/auth/conductor_overrides_test.go, internal/runtime/executor/claude_executor.go

